<!DOCTYPE html>
<html>
<head>
    <title>OCR App</title>
</head>
<body>

<h2>📷 Camera OCR</h2>

<button onclick="startCamera()">Open Camera</button>
<button onclick="stopCamera()">Close Camera</button>

<br><br>

<video id="video" width="400" autoplay style="display:none;"></video>
<br>
<button onclick="capture()" id="captureBtn" style="display:none;">Capture</button>

<hr>

<h2>📁 Upload File</h2>
<form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" id="fileInput" required>
    <button type="submit">Upload</button>
</form>

<hr>

<h3>Result:</h3>
<pre id="result"></pre>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let video = document.getElementById('video');
let stream = null;

// تشغيل الكاميرا
function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
        stream = s;
        video.srcObject = stream;
        video.style.display = "block";
        document.getElementById("captureBtn").style.display = "inline";
    })
    .catch(err => {
        alert("Camera error: " + err);
    });
}

// إيقاف الكاميرا
function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.style.display = "none";
        document.getElementById("captureBtn").style.display = "none";
    }
}

// التقاط صورة
function capture() {
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    context.drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("file", blob, "capture.jpg");

    fetch("/ocr", {
    method: "POST",
    body: formData
})
.then(res => res.json())
.then(data => {
    console.log(data);
    document.getElementById("result").innerText = data.text || data.error;
})
.catch(err => {
    document.getElementById("result").innerText = "Error: " + err;
});
    }, "image/jpeg");
}
</script>
{% if text %}
<hr>
<h3>📄 Uploaded Result:</h3>
<pre>{{ text }}</pre>
{% endif %}
</body>
</html>
